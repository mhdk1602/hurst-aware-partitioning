<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="540" viewBox="0 0 1280 540" role="img" aria-labelledby="title desc">
  <title id="title">Hurst-Aware Adaptive Partitioning</title>
  <desc id="desc">Dark technical banner: time series with rolling Hurst overlay, fixed vs Hurst-aware chunk boundaries, and the falsification gate.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.5" stop-color="#0d1d2b"/>
      <stop offset="1" stop-color="#180e1e"/>
    </linearGradient>
    <linearGradient id="series" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6ea8fe"/>
      <stop offset="1" stop-color="#55d6be"/>
    </linearGradient>
    <linearGradient id="hurst" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f5b84b"/>
      <stop offset="1" stop-color="#f25f5c"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#11202f" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#0a1320" stop-opacity="0.98"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#000" flood-opacity="0.42"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" stroke="#1d3550" stroke-width="0.6" fill="none" opacity="0.55"/>
    </pattern>
    <style>
      .eyebrow { font: 700 14px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #8aa3bb; letter-spacing: 0.22em; }
      .title { font: 800 56px -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif; fill: #f4f9ff; letter-spacing: -0.01em; }
      .subtitle { font: 500 21px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #c7d3e1; }
      .tagline { font: 500 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #93a7bc; }
      .mono { font: 600 13px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #8ff2df; letter-spacing: 0.08em; }
      .micro { font: 700 11px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #9aafc4; letter-spacing: 0.18em; }
      .metric { font: 800 26px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .unit { font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #8ff2df; letter-spacing: 0.04em; }
      .label { font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #dce8f4; }
      .axis { font: 600 11px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; fill: #6b829a; }
      .pill { font: 700 11px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; letter-spacing: 0.14em; }
    </style>
  </defs>

  <rect width="1280" height="540" fill="url(#bg)"/>
  <rect width="1280" height="540" fill="url(#grid)" opacity="0.65"/>

  <g transform="translate(72 70)">
    <text class="eyebrow" textLength="476" lengthAdjust="spacingAndGlyphs">PRE-REGISTERED &#8226; FALSIFIABLE &#8226; H&gt;0.6</text>
    <text class="title" y="74">Cut chunks where</text>
    <text class="title" y="138">the memory breaks.</text>
    <text class="subtitle" y="184" textLength="640" lengthAdjust="spacingAndGlyphs">A registered benchmark: Hurst-aware chunk boundaries vs</text>
    <text class="subtitle" y="212" textLength="640" lengthAdjust="spacingAndGlyphs">fixed-interval and CUSUM baselines, with publish-on-null criteria.</text>

    <g transform="translate(0 258)">
      <g>
        <rect width="200" height="92" rx="14" fill="url(#card)" stroke="#2c4760" filter="url(#shadow)"/>
        <text class="micro" x="20" y="28">PRIMARY EFFECT</text>
        <text class="metric" x="20" y="62">-20 to -40%</text>
        <text class="unit" x="20" y="80">bytes read per query</text>
      </g>
      <g transform="translate(218 0)">
        <rect width="200" height="92" rx="14" fill="url(#card)" stroke="#2c4760" filter="url(#shadow)"/>
        <text class="micro" x="20" y="28">GATE</text>
        <text class="metric" x="20" y="62">95% CI &gt; 0</text>
        <text class="unit" x="20" y="80">paired Wilcoxon, Holm-Bonf</text>
      </g>
      <g transform="translate(436 0)">
        <rect width="200" height="92" rx="14" fill="url(#card)" stroke="#2c4760" filter="url(#shadow)"/>
        <text class="micro" x="20" y="28">DATASETS</text>
        <text class="metric" x="20" y="62">D1 / D2 / D3</text>
        <text class="unit" x="20" y="80">S&amp;P 500 + NAB + fGn pilot</text>
      </g>
    </g>
  </g>

  <g transform="translate(740 60)">
    <rect width="476" height="420" rx="24" fill="url(#card)" stroke="#2c4760" filter="url(#shadow)"/>
    <text class="micro" x="28" y="38">RAW SERIES + ROLLING HURST</text>

    <g transform="translate(28 60)">
      <line x1="0" y1="0" x2="0" y2="160" stroke="#314c64"/>
      <line x1="0" y1="160" x2="420" y2="160" stroke="#314c64"/>

      <line x1="60" y1="0" x2="60" y2="160" stroke="#2c4760" stroke-dasharray="3 3" opacity="0.7"/>
      <line x1="120" y1="0" x2="120" y2="160" stroke="#2c4760" stroke-dasharray="3 3" opacity="0.7"/>
      <line x1="180" y1="0" x2="180" y2="160" stroke="#2c4760" stroke-dasharray="3 3" opacity="0.7"/>
      <line x1="240" y1="0" x2="240" y2="160" stroke="#2c4760" stroke-dasharray="3 3" opacity="0.7"/>
      <line x1="300" y1="0" x2="300" y2="160" stroke="#2c4760" stroke-dasharray="3 3" opacity="0.7"/>
      <line x1="360" y1="0" x2="360" y2="160" stroke="#2c4760" stroke-dasharray="3 3" opacity="0.7"/>

      <path d="M0 70 C20 60 35 84 60 72 C92 56 116 92 142 78 C168 64 196 110 232 96 C264 84 290 36 320 28 C346 22 372 60 396 48 C408 42 416 38 420 36"
            stroke="url(#series)" stroke-width="2.4" fill="none" filter="url(#softGlow)" stroke-linecap="round"/>

      <path d="M0 118 C40 110 88 124 132 116 C176 108 212 130 254 122 C290 116 308 86 340 78 C370 70 392 90 420 82"
            stroke="url(#hurst)" stroke-width="2.8" fill="none" filter="url(#softGlow)" stroke-linecap="round"/>

      <line x1="78" y1="0" x2="78" y2="160" stroke="#f25f5c" stroke-width="2"/>
      <line x1="262" y1="0" x2="262" y2="160" stroke="#f25f5c" stroke-width="2"/>
      <line x1="338" y1="0" x2="338" y2="160" stroke="#f25f5c" stroke-width="2"/>

      <text class="axis" x="0" y="180">t_0</text>
      <text class="axis" x="420" y="180" text-anchor="end">t_N</text>
    </g>

    <g transform="translate(28 240)">
      <text class="micro" x="0" y="0">CHUNK BOUNDARY POLICIES</text>
      <g transform="translate(0 14)">
        <rect width="120" height="40" rx="10" fill="#0a1320" stroke="#314c64"/>
        <text class="pill" x="16" y="22" fill="#8aa3bb">FIXED-DAILY</text>
        <text class="axis" x="16" y="34">grey ticks</text>
      </g>
      <g transform="translate(132 14)">
        <rect width="180" height="40" rx="10" fill="#0a1320" stroke="#314c64"/>
        <text class="pill" x="16" y="22" fill="#f5b84b">VARIANCE-CUSUM</text>
        <text class="axis" x="16" y="34">amplitude shifts</text>
      </g>
      <g transform="translate(324 14)">
        <rect width="124" height="40" rx="10" fill="#0a1320" stroke="#f25f5c"/>
        <text class="pill" x="14" y="22" fill="#f25f5c">HURST-AWARE</text>
        <text class="axis" x="14" y="34">memory breaks</text>
      </g>
    </g>

    <g transform="translate(28 312)">
      <text class="micro" x="0" y="0">PRE-REGISTERED FALSIFICATION GATE &#8226; &#167;13</text>
      <text class="label" x="0" y="20">If CI on bytes-per-query reduction</text>
      <text class="label" x="0" y="38">does not exclude 0 on D1 + D2,</text>
      <text class="label" x="0" y="56">null is published as-is.</text>
    </g>
  </g>

  <g transform="translate(72 510)">
    <text class="mono" x="0" y="0">&#10095; DFA / R/S / GHE / WAVELET &#8226; BLOCK BOOTSTRAP CI &#8226; HOLM-BONF &#8226; ORACLE BASELINE</text>
  </g>
</svg>
